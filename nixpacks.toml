[phases.setup]
nixPkgs = ["python3", "pkg-config", "gcc"]

[phases.install]
cmds = [
  "cd backend && npm install",
  "cd frontend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[variables]
NODE_VERSION = "20"
NODE_ENV = "production"

[start]
cmd = "cd backend && node seed.js && node server.js"
