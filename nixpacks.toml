[phases.setup]
nixPkgs = ["python3", "pkg-config", "gcc"]

[phases.install]
cmds = [
  "cd backend && npm ci",
  "cd frontend && npm install --include=dev"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[variables]
NODE_VERSION = "22"
NODE_ENV = "production"

[start]
cmd = "node backend/seed.js && node backend/server.js"
