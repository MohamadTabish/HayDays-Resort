[phases.setup]
nixPkgs = ["python3", "pkg-config", "gcc"]

[phases.install]
cmds = [
  "cd backend && npm ci",
  "cd frontend && npm install --include=dev"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[variables]
NODE_VERSION = "20"

[start]
cmd = "cd backend && node seed.js && node server.js"
